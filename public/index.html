<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreewayChina — Личный кабинет</title>
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <img src="/logo-green.png" alt="FreewayChina" style="height:120px;width:auto;display:block;">
      </div>

      <!-- Mode toggle -->
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="login">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          Войти
        </button>
        <button class="mode-btn" data-mode="track">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Поиск по треку
        </button>
      </div>

      <!-- Login form -->
      <div id="loginPanel">
        <form id="loginForm" autocomplete="off">
          <div class="form-group">
            <label class="form-label">ID клиента / Логин</label>
            <input class="input-field" id="loginInput"
              type="text" placeholder="Например: 89029 или admin"
              autocorrect="off" autocapitalize="none" spellcheck="false" />
          </div>
          <div class="form-group">
            <label class="form-label">Пароль</label>
            <div style="position:relative">
              <input class="input-field" id="passwordInput"
                type="password" placeholder="Введите пароль"
                autocomplete="current-password" />
              <button type="button" id="togglePwd" class="btn-toggle-pwd" tabindex="-1" aria-label="Показать пароль">
                <svg id="eyeIcon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn-primary" id="loginBtn">Войти</button>
          <div id="loginError" class="form-error hidden"></div>
        </form>
        <p class="form-hint">Войдите для просмотра грузов и управления отправками</p>
      </div>

      <!-- Track search form -->
      <div id="trackPanel" class="hidden">
        <form id="trackForm" autocomplete="off">
          <div class="form-group">
            <label class="form-label">Трек-номер</label>
            <input class="input-field" id="trackInput"
              type="text" placeholder="Введите трек-номер"
              autocorrect="off" autocapitalize="none" spellcheck="false" />
          </div>
          <button type="submit" class="btn-primary" id="trackBtn">Найти груз</button>
          <div id="trackError" class="form-error hidden"></div>
        </form>
        <p class="form-hint">Поиск по трек-номеру по всей базе грузов</p>
      </div>

    </div>
  </div>

  <style>
    .login-logo-text {
      font-family: 'IBM Plex Sans Condensed', 'General Sans', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -.4px;
    }
    .login-card {
      border-top: 2px solid var(--primary);
    }
    .btn-toggle-pwd {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text-3);
      padding: 4px; display: flex; align-items: center;
    }
    .btn-toggle-pwd:hover { color: var(--text-2); }
  </style>

  <script src="login.js"></script>
</body>
</html>
