<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Загрузка треков</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="admin.css" />
  <style>
    .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .upload-main { display: flex; flex-direction: column; gap: 14px; }
    .upload-side  { display: flex; flex-direction: column; gap: 14px; }

    .track-textarea {
      width: 100%;
      height: 260px;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      font-family: 'Courier New', Courier, monospace;
      color: var(--text);
      background: var(--surface-2);
      resize: vertical;
      outline: none;
      line-height: 1.6;
      transition: border-color var(--t);
    }
    .track-textarea:focus { border-color: var(--primary); background: var(--surface); box-shadow: 0 0 0 3px rgba(46,134,222,.14); }
    .track-textarea::placeholder { font-family: system-ui; color: var(--text-3); }

    .upload-file-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--text-2);
      font-size: 13px;
      cursor: pointer;
      transition: all var(--t);
    }
    .upload-file-btn:hover { border-color: var(--primary-bdr); color: var(--primary); background: var(--primary-bg); }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background var(--t), transform var(--t);
      box-shadow: 0 2px 10px rgba(46,134,222,.35);
    }
    .btn-submit:hover { background: var(--primary-h); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; }

    .result-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .result-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }

    .result-stat {
      background: var(--surface-2);
      border-radius: var(--radius);
      padding: 12px 14px;
      border: 1px solid var(--border-light);
    }
    .result-stat-label { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
    .result-stat-value { font-size: 22px; font-weight: 800; }
    .result-stat.ok   .result-stat-value { color: var(--green); }
    .result-stat.warn .result-stat-value { color: var(--amber); }
    .result-stat.err  .result-stat-value { color: var(--red); }
    .result-stat.neu  .result-stat-value { color: var(--text-2); }

    .result-list-title { font-size: 12px; font-weight: 700; color: var(--text-2); margin: 12px 0 6px; text-transform: uppercase; letter-spacing: .4px; }
    .result-list { font-family: 'Courier New', monospace; font-size: 12px; color: var(--text-2); background: var(--surface-2); border-radius: var(--radius-sm); padding: 10px 12px; max-height: 150px; overflow-y: auto; line-height: 1.8; word-break: break-all; }

    @media (max-width: 700px) { .upload-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <header class="dash-header">
    <div class="dash-header-inner">
      <a href="/" class="header-logo">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Z"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
        </svg>
        <span>Logistics</span>
      </a>
      <nav class="admin-nav">
        <a href="/admin.html"       class="admin-nav-link">Dashboard</a>
        <a href="/shipments.html"   class="admin-nav-link">Отправки</a>
        <a href="/upload.html"      class="admin-nav-link active">Создать отгрузку</a>
        <a href="/history.html"     class="admin-nav-link">История</a>
        <a href="/"                 class="admin-nav-link">Клиентский вход</a>
      </nav>
    </div>
  </header>

  <main class="page-content">

    <div class="upload-grid">

      <!-- Left: form -->
      <div class="upload-main">
        <div class="admin-card">
          <div class="card-title">Список трек-номеров</div>
          <textarea class="track-textarea" id="trackInput" placeholder="Вставьте трек-номера, каждый с новой строки:&#10;&#10;464869578050278&#10;YT8841310806314&#10;78959434480625"></textarea>
          <div style="margin-top:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <label class="upload-file-btn">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              Загрузить TXT / CSV
              <input type="file" id="fileInput" accept=".txt,.csv" style="display:none" />
            </label>
            <span id="trackCount" style="font-size:12px;color:var(--text-3)">0 треков</span>
          </div>
        </div>

        <div class="admin-card">
          <div class="card-title">Параметры отправки</div>
          <div style="display:grid;gap:10px">
            <div>
              <label class="form-label">Код отправки <span style="color:var(--red)">*</span></label>
              <input class="input-field" type="text" id="shipmentCode" placeholder="Например: AVEX-2026-04" />
            </div>
            <div>
              <label class="form-label">Дата отправки</label>
              <input class="input-field" type="date" id="shipDate" />
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
              <div>
                <label class="form-label">Вес, кг (необязательно)</label>
                <input class="input-field" type="number" step="0.01" id="totalWeight" placeholder="0.00" />
              </div>
              <div>
                <label class="form-label">Объём, м³ (необязательно)</label>
                <input class="input-field" type="number" step="0.001" id="totalVolume" placeholder="0.000" />
              </div>
            </div>
            <div>
              <label class="form-label">Комментарий (необязательно)</label>
              <input class="input-field" type="text" id="commentField" placeholder="Авиа, EMS, и т.д." />
            </div>
            <div>
              <label class="form-label">Оператор (необязательно)</label>
              <input class="input-field" type="text" id="operatorField" placeholder="Имя сотрудника" />
            </div>
          </div>
        </div>

        <button class="btn-submit" id="submitBtn">
          Создать отправку
        </button>
      </div>

      <!-- Right: result -->
      <div class="upload-side">
        <!-- Placeholder before submit -->
        <div id="resultPlaceholder" class="admin-card" style="text-align:center;padding:40px 20px">
          <div class="state-icon gray" style="margin:0 auto 12px">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <polyline points="9 11 12 14 22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
          </div>
          <p style="font-size:14px;font-weight:600;color:var(--text)">Результат появится здесь</p>
          <p style="font-size:13px;color:var(--text-3);margin-top:6px">Вставьте треки и нажмите кнопку</p>
        </div>

        <!-- Loading -->
        <div id="resultLoading" class="admin-card state-center hidden" style="padding:40px">
          <div class="spinner"></div>
          <p class="state-desc">Обновляем статусы в таблице…</p>
        </div>

        <!-- Result -->
        <div id="resultBox" class="result-box hidden">
          <div class="card-title" id="resultTitle">Результат</div>
          <div class="result-stats" id="resultStats"></div>
          <div id="resultDetails"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="auth-guard.js"></script>
  <script src="utils.js"></script>
  <script src="upload.js"></script>
</body>
</html>
