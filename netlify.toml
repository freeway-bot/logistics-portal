[build]
  publish = "public"
  command = "node scripts/gen-redirects.js"

[build.environment]
  NODE_VERSION = "18"

# lk.freewaychina.com — SPA fallback для клиентского кабинета
[[redirects]]
  from = "/*"
  to = "/client.html"
  status = 200
  conditions = {Host = ["lk.freewaychina.com"]}

# Основной домен — SPA fallback для admin-панели
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
