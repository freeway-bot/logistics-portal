<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Личный кабинет</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.mini.min.js"></script>
</head>
<body>

  <header class="dash-header">
    <div class="dash-header-inner">
      <a href="/" class="header-logo">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Z"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
        </svg>
        <span>Мои грузы</span>
      </a>
      <div class="header-right">
        <div class="client-badge">
          <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <span id="clientIdDisplay">—</span>
        </div>
        <button class="btn-ghost" id="logoutBtn">Выйти</button>
      </div>
    </div>
  </header>

  <main class="page-content">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card s-total">
        <div class="stat-icon">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
          </svg>
        </div>
        <div>
          <div class="stat-label">Всего</div>
          <div class="stat-value" id="totalCount">—</div>
        </div>
      </div>
      <div class="stat-card s-warehouse">
        <div class="stat-icon">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <div>
          <div class="stat-label">На складе</div>
          <div class="stat-value" id="warehouseCount">—</div>
        </div>
      </div>
      <div class="stat-card s-packed">
        <div class="stat-icon">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          </svg>
        </div>
        <div>
          <div class="stat-label">Упаковано</div>
          <div class="stat-value" id="packedCount">—</div>
        </div>
      </div>
      <div class="stat-card s-shipped">
        <div class="stat-icon">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="1" y="3" width="15" height="13" rx="1"/>
            <path d="M16 8h4l3 4v4h-7V8z"/>
            <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
          </svg>
        </div>
        <div>
          <div class="stat-label">Отправлено</div>
          <div class="stat-value" id="shippedCount">—</div>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls-bar">
      <!-- Search -->
      <div class="search-wrap">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Поиск по треку…" />
      </div>

      <div class="ctrl-sep"></div>

      <!-- Status tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="all">Все <span class="tab-count" id="cntAll">0</span></button>
        <button class="tab-btn" data-tab="warehouse">На складе <span class="tab-count" id="cntWarehouse">0</span></button>
        <button class="tab-btn" data-tab="packed">Упаковано <span class="tab-count" id="cntPacked">0</span></button>
        <button class="tab-btn" data-tab="shipped">Отправлено <span class="tab-count" id="cntShipped">0</span></button>
      </div>

      <div class="ctrl-sep"></div>

      <!-- Sort -->
      <select class="sort-select" id="sortSelect">
        <option value="date_desc">Дата ↓ новые</option>
        <option value="date_asc">Дата ↑ старые</option>
        <option value="status_asc">Статус А-Я</option>
        <option value="track_number_asc">Трек А-Я</option>
        <option value="box_number_asc">Коробка А-Я</option>
      </select>

      <div class="ctrl-sep"></div>

      <!-- Export -->
      <div class="export-wrap">
        <button class="btn-export" id="exportBtn">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Экспорт
        </button>
        <div class="export-menu hidden" id="exportMenu">
          <div class="export-menu-label">Скачать список</div>
          <button class="export-menu-item" id="exportCSVBtn">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            Скачать CSV
          </button>
          <button class="export-menu-item" id="exportXLSXBtn">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/>
            </svg>
            Скачать Excel
          </button>
        </div>
      </div>

      <div class="ctrl-sep"></div>

      <!-- View toggle -->
      <div class="view-toggle">
        <button class="view-btn active" id="btnTableView" title="Таблица">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="1"/>
            <line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
          </svg>
        </button>
        <button class="view-btn" id="btnGridView" title="Карточки">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Loading -->
    <div id="loadingState" class="state-center">
      <div class="spinner"></div>
      <p class="state-desc">Загружаем ваши данные…</p>
    </div>

    <!-- Error -->
    <div id="errorState" class="state-center hidden">
      <div class="state-icon red">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <p class="state-title">Ошибка загрузки</p>
      <p class="state-desc" id="errorMessage">Не удалось получить данные.</p>
      <button class="state-btn" onclick="location.reload()">Попробовать снова</button>
    </div>

    <!-- Empty -->
    <div id="emptyState" class="state-center hidden">
      <div class="state-icon gray">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
      <p class="state-title">Ничего не найдено</p>
      <p class="state-desc" id="emptyMessage">Нет грузов в этой категории.</p>
    </div>

    <!-- Table view -->
    <div id="tableView" class="hidden">
      <div class="table-wrapper">
        <div class="table-scroll">
          <table class="items-table">
            <thead>
              <tr>
                <th class="sortable" data-sort="track_number">Трек-номер <span class="sort-arrow">↕</span></th>
                <th class="sortable" data-sort="category">Категория <span class="sort-arrow">↕</span></th>
                <th class="sortable" data-sort="status">Статус <span class="sort-arrow">↕</span></th>
                <th class="sortable" data-sort="box_number">Коробка <span class="sort-arrow">↕</span></th>
                <th class="sortable" data-sort="date">Дата <span class="sort-arrow">↕</span></th>
                <th>Комментарий</th>
                <th>Фото</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div class="table-footer">
          <span class="table-info" id="tableInfo"></span>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>
    </div>

    <!-- Card view -->
    <div id="gridView" class="hidden">
      <div class="cards-grid" id="cardsGrid"></div>
      <div style="display:flex;justify-content:center;margin-top:16px">
        <div class="pagination" id="paginationCards"></div>
      </div>
    </div>

  </main>

  <!-- Photo modal -->
  <div class="modal-overlay hidden" id="photoModal">
    <div class="modal-inner">
      <button class="modal-close" id="modalClose">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <img id="modalImg" src="" alt="Фото" />
    </div>
  </div>

  <script src="utils.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
