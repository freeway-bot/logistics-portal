<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>История операций</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <header class="dash-header">
    <div class="dash-header-inner">
      <a href="/" class="header-logo">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Z"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
        </svg>
        <span>Logistics</span>
      </a>
      <nav class="admin-nav">
        <a href="/admin.html"       class="admin-nav-link">Dashboard</a>
        <a href="/shipments.html"   class="admin-nav-link">Отправки</a>
        <a href="/upload.html"      class="admin-nav-link">Создать отгрузку</a>
        <a href="/history.html"     class="admin-nav-link active">История</a>
        <a href="/"                 class="admin-nav-link">Клиентский вход</a>
      </nav>
      <button class="btn-ghost" id="refreshBtn">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        Обновить
      </button>
    </div>
  </header>

  <main class="page-content">

    <div id="loadingState" class="state-center">
      <div class="spinner"></div>
      <p class="state-desc">Загружаем историю…</p>
    </div>

    <div id="emptyState" class="state-center hidden">
      <div class="state-icon gray">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/>
        </svg>
      </div>
      <p class="state-title">История пуста</p>
      <p class="state-desc">Операции загрузки треков появятся здесь после первого обновления статусов.</p>
    </div>

    <div id="content" class="hidden">
      <div class="admin-card" style="padding:0;overflow:hidden">
        <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
          <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text)">История загрузок</div>
          <span id="totalLabel" style="font-size:12px;color:var(--text-3)"></span>
        </div>
        <div class="table-scroll">
          <table class="items-table" id="historyTable">
            <thead>
              <tr>
                <th>Дата / Время</th>
                <th>Оператор</th>
                <th>Сессия</th>
                <th>Подано</th>
                <th style="color:var(--green)">Обновлено</th>
                <th style="color:var(--red)">Не найдено</th>
                <th style="color:var(--amber)">Дубли</th>
                <th>Уже отпр.</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="historyBody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </main>

  <!-- Detail modal -->
  <div class="modal-overlay hidden" id="detailModal">
    <div class="modal-inner" style="max-width:520px;width:90%;padding:24px;text-align:left;max-height:80vh;overflow-y:auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div style="font-size:14px;font-weight:700" id="detailTitle">Детали операции</div>
        <button class="modal-close" id="detailClose">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="detailBody"></div>
    </div>
  </div>

  <script src="utils.js"></script>
  <script src="history.js"></script>
</body>
</html>
