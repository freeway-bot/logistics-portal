<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logistics Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Z"/>
            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          </svg>
        </div>
        <span class="login-logo-text">Logistics Portal</span>
      </div>

      <!-- Mode toggle -->
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="client">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          Личный кабинет
        </button>
        <button class="mode-btn" data-mode="track">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Поиск по треку
        </button>
      </div>

      <!-- Client ID form -->
      <div id="clientPanel">
        <form id="clientForm" autocomplete="off">
          <div class="form-group">
            <label class="form-label">ID клиента</label>
            <input class="input-field" id="clientInput"
              type="text" placeholder="Например: WAY027"
              autocorrect="off" autocapitalize="none" spellcheck="false" />
          </div>
          <button type="submit" class="btn-primary" id="clientBtn">Войти в кабинет</button>
          <div id="clientError" class="form-error hidden"></div>
        </form>
        <p class="form-hint">Войдите по вашему ID для просмотра всех грузов</p>
      </div>

      <!-- Track search form -->
      <div id="trackPanel" class="hidden">
        <form id="trackForm" autocomplete="off">
          <div class="form-group">
            <label class="form-label">Трек-номер</label>
            <input class="input-field" id="trackInput"
              type="text" placeholder="Введите трек-номер"
              autocorrect="off" autocapitalize="none" spellcheck="false" />
          </div>
          <button type="submit" class="btn-primary" id="trackBtn">Найти груз</button>
          <div id="trackError" class="form-error hidden"></div>
        </form>
        <p class="form-hint">Поиск по трек-номеру по всей базе грузов</p>
      </div>

    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
