<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="icon" type="image/png" href="/freewaychina-09.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Загрузка треков</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="admin.css" />
  <style>
    .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .upload-main { display: flex; flex-direction: column; gap: 14px; }
    .upload-side  { display: flex; flex-direction: column; gap: 14px; }

    .track-textarea {
      width: 100%;
      height: 260px;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      font-family: 'Courier New', Courier, monospace;
      color: var(--text);
      background: var(--surface-2);
      resize: vertical;
      outline: none;
      line-height: 1.6;
      transition: border-color var(--t);
    }
    .track-textarea:focus { border-color: var(--primary); background: var(--surface); box-shadow: 0 0 0 3px rgba(46,134,222,.14); }
    .track-textarea::placeholder { font-family: system-ui; color: var(--text-3); }

    .upload-file-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--text-2);
      font-size: 13px;
      cursor: pointer;
      transition: all var(--t);
    }
    .upload-file-btn:hover { border-color: var(--primary-bdr); color: var(--primary); background: var(--primary-bg); }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background var(--t), transform var(--t);
      box-shadow: 0 2px 10px rgba(46,134,222,.35);
    }
    .btn-submit:hover { background: var(--primary-h); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; }

    .result-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .result-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }

    .result-stat {
      background: var(--surface-2);
      border-radius: var(--radius);
      padding: 12px 14px;
      border: 1px solid var(--border-light);
    }
    .result-stat-label { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
    .result-stat-value { font-size: 22px; font-weight: 800; }
    .result-stat.ok   .result-stat-value { color: var(--green); }
    .result-stat.warn .result-stat-value { color: var(--amber); }
    .result-stat.err  .result-stat-value { color: var(--red); }
    .result-stat.neu  .result-stat-value { color: var(--text-2); }

    .result-list-title { font-size: 12px; font-weight: 700; color: var(--text-2); margin: 12px 0 6px; text-transform: uppercase; letter-spacing: .4px; }
    .result-list { font-family: 'Courier New', monospace; font-size: 12px; color: var(--text-2); background: var(--surface-2); border-radius: var(--radius-sm); padding: 10px 12px; max-height: 150px; overflow-y: auto; line-height: 1.8; word-break: break-all; }

    @media (max-width: 700px) { .upload-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div id="adminHeader"></div>
  <script src="admin-header.js"></script>

  <main class="page-content">

    <div class="upload-grid">

      <!-- Left: form -->
      <div class="upload-main">
        <div class="admin-card">
          <div class="card-title">Список трек-номеров</div>
          <textarea class="track-textarea" id="trackInput" placeholder="Вставьте трек-номера, каждый с новой строки:&#10;&#10;464869578050278&#10;YT8841310806314&#10;78959434480625"></textarea>
          <div style="margin-top:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <label class="upload-file-btn">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              Загрузить TXT / CSV
              <input type="file" id="fileInput" accept=".txt,.csv" style="display:none" />
            </label>
            <span id="trackCount" style="font-size:12px;color:var(--text-3)">0 треков</span>
          </div>
        </div>

        <div class="admin-card">
          <div class="card-title">Параметры отгрузки</div>
          <div style="display:flex;flex-direction:column;gap:12px">
            <div>
              <label class="form-label">ID клиента</label>
              <input class="input-field" type="text" id="clientId" placeholder="Например: WAY258" autocapitalize="characters" spellcheck="false" />
            </div>
            <div>
              <label class="form-label">Номер груза <span style="font-size:11px;color:var(--text-3);font-weight:400">(необязательно)</span></label>
              <input class="input-field" type="text" id="cargoNumber" placeholder="Например: WAY305-1-1004-1" autocapitalize="characters" spellcheck="false" />
              <p style="font-size:11px;color:var(--text-3);margin-top:6px;line-height:1.5">
                Запись появится в «送货 Логистика»: дата, ID клиента и номер груза.
                Остальные параметры (вес, объём, цена, статус) сотрудник дозаполнит вручную.
              </p>
            </div>
            <div style="padding:12px 14px;background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--radius)">
              <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer">
                <input type="checkbox" id="linkOnly" style="width:15px;height:15px;margin-top:2px;cursor:pointer;flex-shrink:0" />
                <span>
                  <span style="font-size:13px;font-weight:600;color:var(--text);display:block;margin-bottom:3px">Только привязать к грузу</span>
                  <span style="font-size:11px;color:var(--text-3);line-height:1.5">Не менять статус треков. Используйте для треков, которые уже в статусе «Отправлено» — они будут автоматически помечены «Доставлено» при появлении даты прибытия груза.</span>
                </span>
              </label>
            </div>
          </div>
        </div>

        <button class="btn-submit" id="submitBtn">
          Создать отгрузку
        </button>
      </div>

      <!-- Right: result -->
      <div class="upload-side">
        <!-- Placeholder before submit -->
        <div id="resultPlaceholder" class="admin-card" style="text-align:center;padding:40px 20px">
          <div class="state-icon gray" style="margin:0 auto 12px">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <polyline points="9 11 12 14 22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
          </div>
          <p style="font-size:14px;font-weight:600;color:var(--text)">Результат появится здесь</p>
          <p style="font-size:13px;color:var(--text-3);margin-top:6px">Вставьте треки и нажмите кнопку</p>
        </div>

        <!-- Loading -->
        <div id="resultLoading" class="admin-card state-center hidden" style="padding:40px">
          <div class="spinner"></div>
          <p class="state-desc">Обновляем статусы в таблице…</p>
        </div>

        <!-- Result -->
        <div id="resultBox" class="result-box hidden">
          <div class="card-title" id="resultTitle">Результат</div>
          <div class="result-stats" id="resultStats"></div>
          <div id="resultDetails"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="auth-guard.js"></script>
  <script src="utils.js"></script>
  <script src="upload.js"></script>
</body>
</html>
