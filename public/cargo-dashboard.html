<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="icon" type="image/png" href="/freewaychina-09.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Аналитика грузов</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="admin.css" />
  <style>
    /* ── Period filter ── */
    .period-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
    }
    .period-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-3);
      margin-right: 4px;
    }
    .period-btn {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1.5px solid var(--border);
      background: var(--surface-2);
      color: var(--text-2);
      cursor: pointer;
      transition: all var(--t);
      white-space: nowrap;
    }
    .period-btn:hover  { border-color: var(--primary-bdr); color: var(--primary); }
    .period-btn.active { border-color: var(--primary); background: var(--primary-bg); color: var(--primary); }

    /* ── KPI cards ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      overflow: hidden;
      transition: box-shadow var(--t), transform var(--t);
    }
    .kpi-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.1); transform: translateY(-1px); }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }
    .kpi-card.blue::before   { background: var(--primary); }
    .kpi-card.amber::before  { background: #f59e0b; }
    .kpi-card.green::before  { background: #10b981; }
    .kpi-card.red::before    { background: #ef4444; }

    .kpi-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .kpi-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }
    .kpi-sub {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
    }
    .kpi-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      opacity: .07;
    }

    /* ── Charts row ── */
    .charts-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .chart-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .chart-sub {
      font-size: 11px;
      color: var(--text-3);
      margin-bottom: 16px;
    }

    .bar-chart-wrap { overflow: hidden; }
    .bar-chart-svg  { width: 100%; display: block; }

    .donut-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .donut-svg { width: 140px; height: 140px; flex-shrink: 0; }
    .donut-legend { width: 100%; }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-2);
      padding: 4px 0;
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-count {
      margin-left: auto;
      font-weight: 700;
      color: var(--text);
    }

    /* ── Lists + Top clients row ── */
    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    .list-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .list-card-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .list-card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .list-card-sub {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 1px;
    }
    .list-card-count {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--text-3);
    }
    .list-card-count.red   { background: #fef2f2; color: #dc2626; }
    .list-card-count.blue  { background: var(--primary-bg); color: var(--primary); }

    .list-empty {
      padding: 32px;
      text-align: center;
      font-size: 13px;
      color: var(--text-3);
    }

    .mini-table { width: 100%; border-collapse: collapse; }
    .mini-table td {
      padding: 10px 18px;
      font-size: 12px;
      border-bottom: 1px solid var(--border-light);
      vertical-align: middle;
    }
    .mini-table tr:last-child td { border-bottom: none; }
    .mini-table tr:hover td { background: var(--primary-bg); }
    .mini-table tr { cursor: pointer; }

    .cargo-id {
      font-family: 'Courier New', monospace;
      font-weight: 700;
      font-size: 11px;
      color: var(--primary-h);
    }
    .arrival-date { font-weight: 600; }
    .arrival-late { color: #dc2626; }
    .arrival-soon { color: #d97706; }
    .arrival-ok   { color: #059669; }

    /* ── Top clients ── */
    .top-client-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border-light);
    }
    .top-client-row:last-child { border-bottom: none; }
    .top-client-info {
      display: flex;
      flex-direction: column;
      min-width: 60px;
    }
    .top-client-id {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }
    .top-client-sum {
      font-size: 10px;
      color: var(--text-3);
    }
    .top-client-bar-wrap {
      flex: 1;
      height: 6px;
      background: var(--border-light);
      border-radius: 3px;
      overflow: hidden;
    }
    .top-client-bar {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      transition: width .4s ease;
    }
    .top-client-count {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-2);
      min-width: 36px;
      text-align: right;
    }

    /* ── Finance row ── */
    .finance-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .fin-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      box-shadow: var(--shadow);
    }
    .fin-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }
    .fin-value {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
    }
    .fin-sub {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 4px;
    }

    /* ── Loading ── */
    .dash-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 300px;
    }

    /* ── Responsive ── */
    @media (max-width: 1100px) {
      .bottom-row { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 900px) {
      .kpi-grid    { grid-template-columns: repeat(2, 1fr); }
      .charts-row  { grid-template-columns: 1fr; }
      .bottom-row  { grid-template-columns: 1fr; }
      .finance-row { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .kpi-grid    { grid-template-columns: 1fr 1fr; }
      .finance-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="adminHeader"></div>
  <script src="admin-header.js"></script>

  <main class="page-content">

    <!-- Loading -->
    <div id="loadingState" class="dash-loading">
      <div class="spinner"></div>
      <p class="state-desc">Загружаем данные грузов…</p>
    </div>

    <!-- Dashboard content -->
    <div id="dashContent" class="hidden">

      <!-- Period filter -->
      <div class="period-bar">
        <span class="period-label">Период:</span>
        <div id="periodFilter"></div>
      </div>

      <!-- KPI cards -->
      <div class="kpi-grid" id="kpiGrid"></div>

      <!-- Charts -->
      <div class="charts-row">
        <div class="chart-card">
          <div class="chart-title">Отгрузки по месяцам</div>
          <div class="chart-sub">Последние 12 месяцев — все данные</div>
          <div class="bar-chart-wrap" id="barChartWrap"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Распределение по статусам</div>
          <div class="chart-sub">За выбранный период</div>
          <div class="donut-wrap" id="donutWrap"></div>
        </div>
      </div>

      <!-- Overdue + Upcoming + Top clients -->
      <div class="bottom-row">
        <div class="list-card">
          <div class="list-card-header">
            <div>
              <div class="list-card-title">Просрочки</div>
              <div class="list-card-sub">~ = расчётная дата (отпр. + 30 дн.)</div>
            </div>
            <span class="list-card-count red" id="overdueCount">0</span>
          </div>
          <div id="overdueList"></div>
        </div>
        <div class="list-card">
          <div class="list-card-header">
            <div>
              <div class="list-card-title">Ближайшие прибытия</div>
              <div class="list-card-sub">Следующие 30 дней</div>
            </div>
            <span class="list-card-count blue" id="upcomingCount">0</span>
          </div>
          <div id="upcomingList"></div>
        </div>
        <div class="list-card">
          <div class="list-card-header">
            <div>
              <div class="list-card-title">Топ клиентов</div>
              <div class="list-card-sub">По числу грузов за период</div>
            </div>
          </div>
          <div id="topClientsList"></div>
        </div>
      </div>

      <!-- Finance -->
      <div class="finance-row" id="financeRow"></div>

    </div>

  </main>

  <script src="auth-guard.js"></script>
  <script src="utils.js"></script>
  <script src="cargo-dashboard.js"></script>
</body>
</html>
