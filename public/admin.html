<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-commerce</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <div id="adminHeader"></div>
  <script src="admin-header.js"></script>

  <main class="page-content">

    <!-- Page action bar -->
    <div class="page-actions" style="display:flex;justify-content:flex-end;margin-bottom:14px">
      <button class="btn-primary" id="addClientBtn" style="font-size:12px;padding:8px 16px">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="margin-right:4px">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Новый клиент
      </button>
    </div>

    <!-- Loading -->
    <div id="loadingState" class="state-center">
      <div class="spinner"></div>
      <p class="state-desc">Загружаем данные…</p>
    </div>

    <!-- Error -->
    <div id="errorState" class="state-center hidden">
      <div class="state-icon red">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <p class="state-title">Ошибка загрузки</p>
      <p class="state-desc" id="errorMsg"></p>
      <button class="state-btn" onclick="loadAll()">Попробовать снова</button>
    </div>

    <div id="content" class="hidden">

      <!-- Missing data alert -->
      <div id="missingAlert" class="hidden" style="
        background:#fffbeb;border:1.5px solid #fcd34d;border-radius:var(--radius);
        padding:12px 16px;margin-bottom:16px;display:flex;align-items:flex-start;gap:12px">
        <svg width="18" height="18" fill="none" stroke="#d97706" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <div style="flex:1;font-size:13px;color:#92400e" id="missingAlertText"></div>
        <button onclick="this.closest('#missingAlert').classList.add('hidden')"
          style="background:none;border:none;cursor:pointer;color:#d97706;font-size:16px;line-height:1;padding:0;flex-shrink:0">✕</button>
      </div>

      <!-- Row 0: Today -->
      <div id="todayRow" style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap"></div>

      <!-- Row 1: Main metrics -->
      <div class="metrics-grid" id="metricsGrid"></div>

      <!-- Row 2: Chart + Problems + Top clients -->
      <div class="admin-row">
        <!-- Daily chart -->
        <div class="admin-card flex-2">
          <div class="card-title">Активность за 14 дней</div>
          <div class="chart-wrap" id="chartWrap">
            <canvas id="dailyChart"></canvas>
          </div>
          <div class="chart-legend">
            <span class="legend-dot" style="background:#3b82f6"></span> Поступило
            <span class="legend-dot" style="background:#10b981;margin-left:16px"></span> Отправлено
          </div>
        </div>

        <!-- Problems -->
        <div class="admin-card flex-1">
          <div class="card-title">Внимание</div>
          <div id="problemsList"></div>
        </div>
      </div>

      <!-- Row 3: Recent + Top clients -->
      <div class="admin-row">
        <!-- Recent arrivals -->
        <div class="admin-card flex-1">
          <div class="card-title">Последние поступления</div>
          <table class="mini-table" id="recentTable"></table>
        </div>

        <!-- Recent shipped -->
        <div class="admin-card flex-1">
          <div class="card-title">Последние отправки</div>
          <table class="mini-table" id="shippedTable"></table>
        </div>

        <!-- Top clients -->
        <div class="admin-card flex-1">
          <div class="card-title">Топ клиентов на складе</div>
          <div id="topClientsList"></div>
        </div>
      </div>

    </div>
  </main>

  <!-- Add Client Modal -->
  <div id="addClientModal" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:400px">
      <div class="modal-header">
        <span class="modal-title">Новый клиент</span>
        <button class="modal-close" id="addClientClose">✕</button>
      </div>

      <div id="addClientForm">
        <div class="form-group" style="margin-top:16px">
          <label class="form-label">Client ID <span style="color:var(--red)">*</span></label>
          <input class="input-field" id="newClientId" type="text"
            placeholder="Например: WAY305" autocapitalize="characters" spellcheck="false"/>
        </div>
        <div class="form-group">
          <label class="form-label">Имя / Компания (необязательно)</label>
          <input class="input-field" id="newClientName" type="text" placeholder="ООО Ромашка"/>
        </div>
        <div id="addClientError" class="form-error hidden"></div>
        <button class="btn-primary" id="addClientSubmit" style="width:100%;margin-top:8px">Создать и получить пароль</button>
      </div>

      <!-- Result shown after creation -->
      <div id="addClientResult" class="hidden" style="margin-top:16px">
        <div style="background:var(--bg-2);border-radius:var(--radius);padding:16px;text-align:center">
          <div style="font-size:12px;color:var(--text-3);margin-bottom:6px">Клиент создан</div>
          <div style="font-size:18px;font-weight:700;color:var(--text-1);letter-spacing:2px" id="resultClientId"></div>
          <div style="margin:12px 0 4px;font-size:12px;color:var(--text-3)">Пароль для входа</div>
          <div style="display:flex;align-items:center;justify-content:center;gap:8px">
            <code style="font-size:20px;font-weight:700;color:var(--accent);letter-spacing:3px" id="resultPassword"></code>
            <button class="btn-ghost" id="copyPwdBtn" style="padding:4px 8px;font-size:11px">Копировать</button>
          </div>
          <div style="margin-top:12px;font-size:11px;color:var(--text-3)">
            Пароль сохранён в листе <b>«Пароли»</b> таблицы Логистика
          </div>
        </div>
        <button class="btn-ghost" id="addAnotherBtn" style="width:100%;margin-top:10px">+ Добавить ещё одного</button>
      </div>
    </div>
  </div>

  <script src="auth-guard.js"></script>
  <script src="utils.js"></script>
  <script src="admin.js"></script>
</body>
</html>
